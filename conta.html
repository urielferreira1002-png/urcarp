<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conta | URCA RP</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1428 100%);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* Efeito de fundo animado */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 50%, rgba(139, 0, 255, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(0, 255, 255, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Container principal */
    .main-container {
      position: relative;
      z-index: 1;
    }

    /* Seção de login */
    .conta-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 80px);
      padding: 40px 20px;
    }

    /* Caixa principal */
    .conta-box {
      background: rgba(20, 25, 50, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(139, 0, 255, 0.3);
      border-radius: 20px;
      padding: 60px 40px;
      max-width: 450px;
      width: 100%;
      box-shadow: 
        0 0 40px rgba(139, 0, 255, 0.2),
        0 0 80px rgba(0, 255, 255, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      animation: slideUp 0.6s ease-out;
      position: relative;
      overflow: hidden;
    }

    .conta-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(139, 0, 255, 0.5), transparent);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Títulos */
    .conta-box h2 {
      color: #fff;
      font-size: 32px;
      margin-bottom: 15px;
      text-align: center;
      background: linear-gradient(135deg, #8b00ff, #00ffff, #8b00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
    }

    .conta-box > p {
      color: #a0aec0;
      text-align: center;
      margin-bottom: 40px;
      font-size: 15px;
      letter-spacing: 0.5px;
    }

    /* Campos de input */
    .input-group {
      margin-bottom: 20px;
      animation: fadeInUp 0.6s ease-out forwards;
      opacity: 0;
    }

    .input-group:nth-child(4) { animation-delay: 0.1s; }
    .input-group:nth-child(5) { animation-delay: 0.2s; }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 15px 18px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(139, 0, 255, 0.3);
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    input[type="email"]::placeholder,
    input[type="password"]::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.08);
      border-color: #8b00ff;
      box-shadow: 0 0 20px rgba(139, 0, 255, 0.3);
    }

    /* Botões */
    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-login {
      background: linear-gradient(135deg, #8b00ff, #00ffff);
      color: #fff;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(139, 0, 255, 0.3);
      animation: fadeInUp 0.6s ease-out 0.3s both;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(139, 0, 255, 0.4);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .divisor {
      text-align: center;
      color: #666;
      margin: 30px 0;
      font-size: 14px;
      animation: fadeInUp 0.6s ease-out 0.4s both;
    }

    .divisor::before,
    .divisor::after {
      content: '';
      display: inline-block;
      width: 45%;
      height: 1px;
      background: linear-gradient(90deg, transparent, #666, transparent);
      vertical-align: middle;
      margin: 0 10px;
    }

    .btn-google {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      animation: fadeInUp 0.6s ease-out 0.5s both;
    }

    .btn-google:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: #8b00ff;
      box-shadow: 0 0 20px rgba(139, 0, 255, 0.2);
    }

    /* Painel do usuário logado */
    #painel {
      display: none;
    }

    .user-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 40px;
      padding-bottom: 30px;
      border-bottom: 1px solid rgba(139, 0, 255, 0.2);
    }

    .user-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #8b00ff, #00ffff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      box-shadow: 0 0 30px rgba(139, 0, 255, 0.4);
    }

    .user-info h3 {
      color: #fff;
      font-size: 20px;
      margin-bottom: 5px;
    }

    .user-info p {
      color: #a0aec0;
      font-size: 13px;
    }

    /* Cards de informações */
    .info-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin: 30px 0;
    }

    .info-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(139, 0, 255, 0.2);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      transition: all 0.3s ease;
    }

    .info-card:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: #8b00ff;
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(139, 0, 255, 0.2);
    }

    .info-card label {
      display: block;
      color: #a0aec0;
      font-size: 12px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .info-card strong {
      color: #fff;
      font-size: 18px;
      display: block;
      color: #8b00ff;
    }

    /* Botão sair */
    .btn-logout {
      background: linear-gradient(135deg, #ff4757, #ff6b7a);
      color: #fff;
      margin-top: 30px;
    }

    .btn-logout:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(255, 71, 87, 0.4);
    }

    /* Responsivo */
    @media (max-width: 768px) {
      .conta-box {
        padding: 40px 25px;
        margin: 20px;
      }

      .conta-box h2 {
        font-size: 24px;
      }

      .info-cards {
        grid-template-columns: 1fr;
      }
    }

    /* Animação de carregamento */
    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.7;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER COM HAMBURGER -->
  <header class="header-urca">
    <div class="header-content">
      <h1>🎮 URCA RP</h1>
      <div class="header-actions">
        <button class="hamburger-btn" type="button" aria-label="Abrir menu" aria-expanded="false" aria-controls="headerMenu">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <nav class="header-menu" id="headerMenu">
          <div class="header-menu-title">NAVEGAÇÃO</div>
          <a href="index.html">🏠 Início</a>
          <a href="loja.html">🚗 Loja</a>
          <a href="vip.html">💎 VIP</a>
          <a href="conta.html" class="active">👤 Conta</a>
          <hr>
          <a href="https://discord.gg" target="_blank">💬 Discord</a>
        </nav>
      </div>
    </div>
  </header>

  <div class="main-container">
    <!-- LOGIN -->
    <section class="conta-container" id="login">
      <div class="conta-box">
        <h2>Minha Conta</h2>
        <p>Entre para acessar sua garagem</p>

        <div class="input-group">
          <input type="email" id="emailInput" placeholder="📧 Email">
        </div>
        <div class="input-group">
          <input type="password" id="senhaInput" placeholder="🔒 Senha">
        </div>

        <button class="btn-login" onclick="entrar()">ENTRAR</button>

        <div class="divisor">ou</div>

        <button class="btn-google" onclick="loginGoogle()">
          <span>🔐</span>
          Entrar com Google
        </button>
      </div>
    </section>

    <!-- PAINEL LOGADO -->
    <section id="painel" class="conta-container">
      <div class="conta-box">
        <div class="user-header">
          <div class="user-avatar">🎮</div>
          <div class="user-info">
            <h3 id="nome">Jogador</h3>
            <p>Bem-vindo de volta!</p>
          </div>
        </div>

        <div class="info-cards">
          <div class="info-card">
            <label>Email</label>
            <strong id="email">user@example.com</strong>
          </div>
          <div class="info-card">
            <label>Status VIP</label>
            <strong>🌟 Nenhum</strong>
          </div>
          <div class="info-card">
            <label>Veículos</label>
            <strong id="veiculos">0</strong>
          </div>
          <div class="info-card">
            <label>Dinheiro</label>
            <strong id="dinheiro">$0</strong>
          </div>
        </div>

        <button class="btn-logout" onclick="window.location.href='index.html'">VOLTAR AO INÍCIO</button>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
  <script src="menu-script.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut }
      from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD6PKr-rfpjcU6q6WyoXBZ-WgsuAzUNl3E",
      authDomain: "urca-rp.firebaseapp.com",
      projectId: "urca-rp",
      storageBucket: "urca-rp.firebasestorage.app",
      messagingSenderId: "398721982785",
      appId: "1:398721982785:web:7465f3fb92b704981bc1c0"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    window.loginGoogle = function () {
      signInWithPopup(auth, provider)
        .then((result) => {
          const user = result.user;
          mostrarPainel(user);
        })
        .catch(() => alert("Erro no login com Google"));
    };

    window.entrar = function () {
      alert("Login com email em desenvolvimento. Use Google!");
    };

    window.logout = function () {
      signOut(auth).then(() => location.reload());
    };

    function mostrarPainel(user) {
      document.getElementById("login").style.display = "none";
      document.getElementById("painel").style.display = "flex";
      document.getElementById("nome").textContent = user.displayName || "Usuário";
      document.getElementById("email").textContent = user.email;
    }

    onAuthStateChanged(auth, (user) => {
      if (user) mostrarPainel(user);
    });
  </script>
</body>

</html>
