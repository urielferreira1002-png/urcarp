<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conta | URCA RP</title>
  <link rel="stylesheet" href="style.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Manrope:wght@400;500;600;700&display=swap');

    :root {
      --bg-deep: #0a0c10;
      --bg-mid: #131722;
      --line: rgba(232, 194, 130, 0.26);
      --line-strong: rgba(232, 194, 130, 0.52);
      --text-main: #fff6e8;
      --text-soft: rgba(255, 241, 220, 0.7);
      --accent: #e8c282;
      --accent-strong: #ffdb9e;
      --danger: #ff6363;
      --danger-strong: #ff8b8b;
    }

    body {
      font-family: 'Manrope', sans-serif;
      background:
        radial-gradient(circle at 12% 20%, rgba(232, 194, 130, 0.14), transparent 42%),
        radial-gradient(circle at 88% 80%, rgba(255, 146, 87, 0.1), transparent 35%),
        linear-gradient(145deg, var(--bg-deep) 0%, #10131a 52%, var(--bg-mid) 100%);
      color: var(--text-main);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background:
        linear-gradient(120deg, transparent 0%, rgba(255, 255, 255, 0.025) 35%, transparent 70%),
        repeating-linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.01),
          rgba(255, 255, 255, 0.01) 2px,
          transparent 2px,
          transparent 14px
        );
      pointer-events: none;
      z-index: 0;
    }

    .main-container {
      position: relative;
      z-index: 1;
    }

    .conta-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 80px);
      padding: 48px 20px;
    }

    .conta-box {
      background: linear-gradient(160deg, rgba(22, 25, 33, 0.92), rgba(12, 15, 20, 0.94));
      backdrop-filter: blur(12px);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 56px 38px;
      max-width: 510px;
      width: 100%;
      box-shadow:
        0 24px 70px rgba(0, 0, 0, 0.45),
        0 10px 40px rgba(232, 194, 130, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
      animation: slideUp 0.55s ease-out;
      position: relative;
      overflow: hidden;
    }

    .conta-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, rgba(255, 219, 158, 0.8), transparent);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .conta-box h2 {
      color: var(--accent-strong);
      font-family: 'Cinzel', serif;
      font-size: clamp(28px, 4vw, 34px);
      letter-spacing: 0.04em;
      margin-bottom: 12px;
      text-align: center;
      font-weight: 700;
    }

    .conta-box > p {
      color: var(--text-soft);
      text-align: center;
      margin-bottom: 36px;
      font-size: 14px;
      letter-spacing: 0.03em;
    }

    .input-group {
      margin-bottom: 16px;
      animation: fadeInUp 0.6s ease-out forwards;
      opacity: 0;
    }

    .input-group:nth-child(4) { animation-delay: 0.1s; }
    .input-group:nth-child(5) { animation-delay: 0.2s; }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--line);
      border-radius: 12px;
      color: var(--text-main);
      font-size: 15px;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    input[type="email"]::placeholder,
    input[type="password"]::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--line-strong);
      box-shadow: 0 0 0 4px rgba(232, 194, 130, 0.12);
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .btn-login {
      background: linear-gradient(135deg, #c89655, #f5c780);
      color: #161109;
      margin-bottom: 16px;
      box-shadow: 0 12px 24px rgba(243, 194, 121, 0.25);
      animation: fadeInUp 0.6s ease-out 0.3s both;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 32px rgba(243, 194, 121, 0.35);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .divisor {
      text-align: center;
      color: rgba(255, 241, 220, 0.5);
      margin: 22px 0;
      font-size: 12px;
      animation: fadeInUp 0.6s ease-out 0.4s both;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }

    .divisor::before,
    .divisor::after {
      content: '';
      display: inline-block;
      width: 40%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--line), transparent);
      vertical-align: middle;
      margin: 0 8px;
    }

    .btn-google {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-main);
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      animation: fadeInUp 0.6s ease-out 0.5s both;
    }

    .btn-google:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--line-strong);
      box-shadow: 0 0 0 4px rgba(232, 194, 130, 0.1);
    }

    #painel {
      display: none;
    }

    .user-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 34px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--line);
    }

    .user-avatar {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      border: 2px solid var(--line-strong);
      background: linear-gradient(145deg, #2c2f36, #14171d);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.42);
    }

    .user-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .user-avatar-fallback {
      font-family: 'Cinzel', serif;
      font-size: 30px;
      font-weight: 700;
      color: var(--accent-strong);
    }

    .user-info h3 {
      color: var(--text-main);
      font-size: 20px;
      margin-bottom: 5px;
    }

    .user-info p {
      color: var(--text-soft);
      font-size: 13px;
    }

    .info-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin: 26px 0;
    }

    .info-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      transition: all 0.3s ease;
    }

    .info-card:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--line-strong);
      transform: translateY(-4px);
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.25);
    }

    .info-card label {
      display: block;
      color: var(--text-soft);
      font-size: 11px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .info-card strong {
      color: var(--accent-strong);
      font-size: 17px;
      display: block;
    }

    .btn-logout {
      background: linear-gradient(135deg, var(--danger), var(--danger-strong));
      color: #fff;
      margin-top: 22px;
    }

    .btn-logout:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px rgba(255, 71, 87, 0.35);
    }

    @media (max-width: 768px) {
      .conta-box {
        padding: 42px 22px;
        margin: 14px;
      }

      .conta-box h2 {
        font-size: 26px;
      }

      .info-cards {
        grid-template-columns: 1fr;
      }

      .user-header {
        align-items: flex-start;
      }
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.7;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER COM HAMBURGER -->
  <header class="header-urca">
    <div class="header-content">
      <h1>🎮 URCA RP</h1>
      <div class="header-actions">
        <button class="hamburger-btn" type="button" aria-label="Abrir menu" aria-expanded="false" aria-controls="headerMenu">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <nav class="header-menu" id="headerMenu">
          <div class="header-menu-title">NAVEGAÇÃO</div>
          <a href="index.html">🏠 Início</a>
          <a href="loja.html">🚗 Loja</a>
          <a href="vip.html">💎 VIP</a>
          <a href="conta.html" class="active">👤 Conta</a>
          <hr>
          <a href="https://discord.gg" target="_blank">💬 Discord</a>
        </nav>
      </div>
    </div>
  </header>

  <div class="main-container">
    <!-- LOGIN -->
    <section class="conta-container" id="login">
      <div class="conta-box">
        <h2>Minha Conta</h2>
        <p>Entre para acessar sua garagem</p>

        <div class="input-group">
          <input type="email" id="emailInput" placeholder="📧 Email">
        </div>
        <div class="input-group">
          <input type="password" id="senhaInput" placeholder="🔒 Senha">
        </div>

        <button class="btn-login" onclick="entrar()">ENTRAR</button>

        <div class="divisor">ou</div>

        <button class="btn-google" onclick="loginGoogle()">
          <span>🔐</span>
          Entrar com Google
        </button>
      </div>
    </section>

    <!-- PAINEL LOGADO -->
    <section id="painel" class="conta-container">
      <div class="conta-box">
        <div class="user-header">
          <div class="user-avatar">
            <img id="avatarImage" alt="Foto de perfil">
            <span id="avatarFallback" class="user-avatar-fallback">🎮</span>
          </div>
          <div class="user-info">
            <h3 id="nome">Jogador</h3>
            <p>Bem-vindo de volta!</p>
          </div>
        </div>

        <div class="info-cards">
          <div class="info-card">
            <label>Email</label>
            <strong id="email">user@example.com</strong>
          </div>
          <div class="info-card">
            <label>Status VIP</label>
            <strong>🌟 Nenhum</strong>
          </div>
          <div class="info-card">
            <label>Veículos</label>
            <strong id="veiculos">0</strong>
          </div>
          <div class="info-card">
            <label>Dinheiro</label>
            <strong id="dinheiro">$0</strong>
          </div>
        </div>

        <button class="btn-logout" onclick="window.location.href='index.html'">VOLTAR AO INÍCIO</button>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
  <script src="menu-script.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut }
      from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD6PKr-rfpjcU6q6WyoXBZ-WgsuAzUNl3E",
      authDomain: "urca-rp.firebaseapp.com",
      projectId: "urca-rp",
      storageBucket: "urca-rp.firebasestorage.app",
      messagingSenderId: "398721982785",
      appId: "1:398721982785:web:7465f3fb92b704981bc1c0"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    window.loginGoogle = function () {
      signInWithPopup(auth, provider)
        .then((result) => {
          const user = result.user;
          mostrarPainel(user);
        })
        .catch(() => alert("Erro no login com Google"));
    };

    window.entrar = function () {
      alert("Login com email em desenvolvimento. Use Google!");
    };

    window.logout = function () {
      signOut(auth).then(() => location.reload());
    };

    function mostrarPainel(user) {
      const avatarImage = document.getElementById("avatarImage");
      const avatarFallback = document.getElementById("avatarFallback");
      const nomeExibicao = user.displayName || "Usuário";
      const inicialNome = nomeExibicao.trim().charAt(0).toUpperCase() || "U";

      document.getElementById("login").style.display = "none";
      document.getElementById("painel").style.display = "flex";
      document.getElementById("nome").textContent = nomeExibicao;
      document.getElementById("email").textContent = user.email || "Email não informado";

      if (user.photoURL) {
        avatarImage.src = user.photoURL;
        avatarImage.style.display = "block";
        avatarFallback.style.display = "none";
      } else {
        avatarImage.removeAttribute("src");
        avatarImage.style.display = "none";
        avatarFallback.textContent = inicialNome;
        avatarFallback.style.display = "inline";
      }
    }

    onAuthStateChanged(auth, (user) => {
      if (user) mostrarPainel(user);
    });
  </script>
</body>

</html>
